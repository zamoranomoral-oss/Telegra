{% extends "base.html" %}

{% block title %}Login - Telegram Stremio{% endblock %}

{% block content %}
<div class="flex-1 flex items-center justify-center py-4 min-h-0">

    <div class="w-full max-w-md rounded-[2rem] overflow-hidden glass-panel self-center">

        <div class="p-6 sm:p-10 flex flex-col justify-center bg-card/20">

            <div class="flex items-center gap-3 justify-center mb-6">
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center shadow-[0_0_15px_var(--primary)]">
                    <i class="fa-solid fa-play text-white text-sm"></i>
                </div>
                <span class="text-2xl font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-primary to-accent">
                    TG Stremio
                </span>
            </div>

            <div class="text-center mb-6">
                <h2 class="text-lg font-bold tracking-tight text-text">Admin Authentication</h2>
                <p class="text-text-secondary text-xs mt-1">Access your management console</p>
            </div>

            {% if error %}
            <div class="flex items-center gap-3 bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-2.5 rounded-xl mb-6 animate-pulse">
                <i class="fa-solid fa-circle-exclamation text-xs"></i>
                <p class="text-xs font-medium">{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" class="space-y-4">

                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-text-secondary ml-1">Username</label>
                    <div class="relative group">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-text-secondary group-focus-within:text-primary transition-colors text-sm"></i>
                        <input type="text" name="username" required
                            class="w-full pl-11 pr-4 py-3 bg-background/50 rounded-2xl border border-white/5 focus:border-primary/50 focus:ring-4 focus:ring-primary/10 outline-none transition-all text-text text-sm"
                            placeholder="Admin ID">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-text-secondary ml-1">Password</label>
                    <div class="relative group">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-text-secondary group-focus-within:text-primary transition-colors text-sm"></i>
                        
                        <input type="password" id="password" name="password" required
                            class="w-full pl-11 pr-11 py-3 bg-background/50 rounded-2xl border border-white/5 focus:border-primary/50 focus:ring-4 focus:ring-primary/10 outline-none transition-all text-text text-sm"
                            placeholder="••••••••">

                        <button type="button" onclick="togglePassword()" 
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary hover:text-primary transition-colors">
                            <i id="eyeIcon" class="fa-solid fa-eye text-xs"></i>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-3.5 rounded-2xl bg-primary hover:brightness-110 text-background font-bold transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-3 mt-4">
                    <i class="fa-solid fa-right-to-bracket text-sm"></i>
                    Sign In
                </button>

            </form>

        </div>
    </div>
</div>

<style>
    /* Strictly disable scrolling on the login screen */
    html, body { 
        height: 100%; 
        overflow: hidden !important; 
    }
    
    /* Ensure the 'main' block from base.html takes full height */
    main {
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    input::placeholder {
        color: color-mix(in srgb, var(--text-sec) 40%, transparent);
    }
</style>

<script>
    function togglePassword() {
        const input = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");

        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>

{% endblock %}
